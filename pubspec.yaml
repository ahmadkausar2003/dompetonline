name: aplikasi_keuangan_mahasiswa
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  sqflite: ^2.4.3
  path: ^1.9.1
  flutter_riverpod: ^3.3.2
  shared_preferences: ^2.5.5
  intl: ^0.20.3
  fl_chart: ^1.2.0
  image_picker: ^1.2.3
  pdf: ^3.13.0
  path_provider: ^2.1.6
  share_plus: ^13.2.0
  
  # --- FIREBASE PACKAGES ---
  firebase_core: ^4.12.1
  firebase_auth: ^6.5.6
  cloud_firestore: ^6.7.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.8

# --- BAGIAN FLUTTER UTAMA ---
flutter:
  uses-material-design: true
  assets:
    - lib/assets/images/

# --- KONFIGURASI IKON APLIKASI (PATRICK) ---
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "lib/assets/images/3.png"
  adaptive_icon_background: "#40BFC2"
  adaptive_icon_foreground: "lib/assets/images/3.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "lib/assets/images/3.png"
    background_color: "#40BFC2"
    theme_color: "#40BFC2"

# --- KONFIGURASI SPLASH SCREEN ---
flutter_native_splash:
  color: "#F8FAFC"
  image: "lib/assets/images/4.png"
  color_dark: "#0F172A"
  image_dark: "lib/assets/images/4.png"
  android_12:
    image: "lib/assets/images/4.png"
    icon_background_color: "#F8FAFC"
    image_dark: "lib/assets/images/4.png"
    icon_background_color_dark: "#0F172A"